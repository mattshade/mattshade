<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="260">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="100%" stop-color="#0e1013"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="rgba(190, 242, 100, 0.12)"/>
    </pattern>
    <filter id="glow-lime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes float-offset {
      0%, 100% { transform: translateY(-4px) translateX(0px); }
      50% { transform: translateY(3px) translateX(2px); }
    }
    @keyframes wing-left {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg); }
    }
    @keyframes wing-right {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes scanline {
      0% { transform: translateY(-10px); opacity: 0; }
      10%, 90% { opacity: 0.35; }
      100% { transform: translateY(270px); opacity: 0; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    .bird-hero { animation: float-slow 8s ease-in-out infinite; }
    .bird-flock { animation: float-offset 10s ease-in-out infinite; }
    .wing-l { transform-origin: 0 0; animation: wing-left 4s ease-in-out infinite; }
    .wing-r { transform-origin: 0 0; animation: wing-right 4s ease-in-out infinite; }
    .scan-line-element { animation: scanline 9s linear infinite; }
    .terminal-cursor { animation: cursor-blink 1.1s step-end infinite; }
    .wire { fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="900" height="260" fill="url(#bg-grad)"/>
  <rect width="900" height="260" fill="url(#grid)"/>
  <rect width="900" height="260" fill="url(#bg-grad)" opacity="0.35"/>

  <line x1="0" y1="0" x2="900" y2="0" stroke="rgba(94, 196, 220, 0.12)" stroke-width="1.5" class="scan-line-element"/>

  <!-- Architectural guides (left) -->
  <g opacity="0.55">
    <circle cx="150" cy="130" r="90" fill="none" stroke="rgba(94, 196, 220, 0.1)" stroke-width="1" stroke-dasharray="4 4"/>
    <circle cx="150" cy="130" r="60" fill="none" stroke="rgba(190, 242, 100, 0.08)" stroke-width="1"/>
    <circle cx="150" cy="130" r="30" fill="none" stroke="rgba(94, 196, 220, 0.08)" stroke-width="1"/>
    <line x1="40" y1="130" x2="260" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="150" y1="20" x2="150" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="60" y1="40" x2="240" y2="220" stroke="rgba(94, 196, 220, 0.05)" stroke-width="1"/>
    <line x1="60" y1="220" x2="240" y2="40" stroke="rgba(190, 242, 100, 0.05)" stroke-width="1"/>
  </g>

  <!-- Hero origami crane (portfolio wireframe style) -->
  <g transform="translate(610, 28)" class="bird-hero">
    <g transform="scale(1.15)">
      <!-- body diamond -->
      <polygon class="wire" points="0,-18 30,10 0,38 -30,10" fill="rgba(18,26,20,0.55)" stroke="#5f7a58" stroke-width="1"/>
      <line class="wire" x1="0" y1="-18" x2="0" y2="38" stroke="#bef264" stroke-width="0.85" opacity="0.65"/>
      <line class="wire" x1="-30" y1="10" x2="30" y2="10" stroke="rgba(122,154,110,0.55)" stroke-width="0.75"/>
      <line class="wire" x1="0" y1="-18" x2="-30" y2="10" stroke="rgba(95,122,88,0.45)" stroke-width="0.65"/>
      <line class="wire" x1="0" y1="-18" x2="30" y2="10" stroke="rgba(95,122,88,0.45)" stroke-width="0.65"/>
      <line class="wire" x1="-30" y1="10" x2="0" y2="38" stroke="rgba(95,122,88,0.45)" stroke-width="0.65"/>
      <line class="wire" x1="30" y1="10" x2="0" y2="38" stroke="rgba(95,122,88,0.45)" stroke-width="0.65"/>

      <!-- neck + head -->
      <polyline class="wire" points="-2,8 6,-16 10,-34 14,-44" stroke="#7a9a6e" stroke-width="1"/>
      <line class="wire" x1="6" y1="-16" x2="-2" y2="8" stroke="rgba(94,196,220,0.35)" stroke-width="0.75"/>
      <polyline class="wire" points="14,-44 22,-50 10,-46" stroke="#bef264" stroke-width="1" filter="url(#glow-lime)"/>
      <line class="wire" x1="10" y1="-34" x2="14" y2="-44" stroke="rgba(190,242,100,0.45)" stroke-width="0.65"/>

      <!-- tail -->
      <polyline class="wire" points="0,38 -8,62 0,78" stroke="#5ec4dc" stroke-width="1" filter="url(#glow-cyan)"/>
      <polyline class="wire" points="0,38 8,62 0,78" stroke="rgba(94,196,220,0.55)" stroke-width="0.75"/>
      <line class="wire" x1="0" y1="38" x2="0" y2="78" stroke="rgba(94,196,220,0.35)" stroke-width="0.65"/>

      <!-- wings -->
      <g class="wing-l" transform="translate(0, 6)">
        <polygon class="wire" points="0,0 -52,-8 -18,18" fill="rgba(94,196,220,0.06)" stroke="rgba(94,196,220,0.45)" stroke-width="1"/>
        <line class="wire" x1="0" y1="0" x2="-52" y2="-8" stroke="#7a9a6e" stroke-width="0.75"/>
        <line class="wire" x1="-52" y1="-8" x2="-18" y2="18" stroke="rgba(94,196,220,0.35)" stroke-width="0.65"/>
        <line class="wire" x1="-18" y1="18" x2="0" y2="0" stroke="rgba(94,196,220,0.35)" stroke-width="0.65"/>
        <line class="wire" x1="-34" y1="4" x2="-18" y2="18" stroke="rgba(122,154,110,0.35)" stroke-width="0.55"/>
      </g>
      <g class="wing-r" transform="translate(0, 6)">
        <polygon class="wire" points="0,0 52,-8 18,18" fill="rgba(94,196,220,0.1)" stroke="rgba(94,196,220,0.55)" stroke-width="1"/>
        <line class="wire" x1="0" y1="0" x2="52" y2="-8" stroke="#7a9a6e" stroke-width="0.75"/>
        <line class="wire" x1="52" y1="-8" x2="18" y2="18" stroke="rgba(94,196,220,0.35)" stroke-width="0.65"/>
        <line class="wire" x1="18" y1="18" x2="0" y2="0" stroke="rgba(94,196,220,0.35)" stroke-width="0.65"/>
        <line class="wire" x1="34" y1="4" x2="18" y2="18" stroke="rgba(122,154,110,0.35)" stroke-width="0.55"/>
      </g>

      <!-- guide wires -->
      <line class="wire" x1="14" y1="-44" x2="88" y2="-72" stroke="rgba(255,255,255,0.06)" stroke-width="0.75" stroke-dasharray="2 3"/>
      <line class="wire" x1="0" y1="78" x2="-42" y2="118" stroke="rgba(255,255,255,0.06)" stroke-width="0.75" stroke-dasharray="2 3"/>
    </g>
  </g>

  <!-- Flock crane -->
  <g transform="translate(760, 18) scale(0.52)" class="bird-flock">
    <polygon class="wire" points="0,-18 30,10 0,38 -30,10" fill="rgba(18,26,20,0.45)" stroke="#5f7a58" stroke-width="1"/>
    <line class="wire" x1="0" y1="-18" x2="0" y2="38" stroke="#bef264" stroke-width="0.75" opacity="0.5"/>
    <polyline class="wire" points="-2,8 6,-16 10,-34 14,-44" stroke="#7a9a6e" stroke-width="0.85"/>
    <polyline class="wire" points="14,-44 22,-50 10,-46" stroke="#bef264" stroke-width="0.85"/>
    <polyline class="wire" points="0,38 -8,62 0,78" stroke="#5ec4dc" stroke-width="0.85"/>
    <g class="wing-l" transform="translate(0, 6)">
      <polygon class="wire" points="0,0 -52,-8 -18,18" fill="rgba(94,196,220,0.05)" stroke="rgba(94,196,220,0.4)" stroke-width="0.85"/>
    </g>
    <g class="wing-r" transform="translate(0, 6)">
      <polygon class="wire" points="0,0 52,-8 18,18" fill="rgba(94,196,220,0.08)" stroke="rgba(94,196,220,0.45)" stroke-width="0.85"/>
    </g>
  </g>

  <!-- Center copy -->
  <g transform="translate(180, 0)">
    <line x1="50" y1="60" x2="50" y2="185" stroke="rgba(94, 196, 220, 0.25)" stroke-width="2"/>
    <circle cx="50" cy="60" r="2" fill="#5ec4dc"/>
    <circle cx="50" cy="185" r="2" fill="#5ec4dc"/>

    <text x="70" y="90" fill="#bef264" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" font-weight="600" letter-spacing="0.25em">ENGINEERING &amp; DESIGN</text>
    <text x="70" y="142" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="0.04em">MATT SHADE</text>
    <text x="70" y="174" fill="rgba(255, 255, 255, 0.65)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12" letter-spacing="0.08em">
      DIRECTOR OF AI ENGINEERING <tspan fill="#5ec4dc">//</tspan> DESIGN ENGINEERING
    </text>
    <text x="70" y="195" fill="rgba(255, 255, 255, 0.25)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="9">
      BRIDGE PERSON // SYSTEMS + DESIGN + AI<tspan fill="#bef264" class="terminal-cursor">_</tspan>
    </text>
  </g>

  <rect x="894" y="80" width="6" height="40" fill="#5ec4dc" opacity="0.8"/>
  <rect x="894" y="125" width="6" height="50" fill="#bef264" opacity="0.8"/>
</svg>
