<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="260">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="100%" stop-color="#0e1013"/>
    </linearGradient>

    <!-- Glow Filters with Animated Pulsing Deviation -->
    <filter id="glow-lime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur">
        <animate attributeName="stdDeviation" values="3;7;3" dur="4s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur">
        <animate attributeName="stdDeviation" values="2;6;2" dur="5s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Pattern for Grid -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    /* CSS Keyframe Animations */
    @keyframes float-slow {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    
    @keyframes float-offset {
      0% { transform: translateY(-5px) translateX(0px) rotate(-1deg); }
      50% { transform: translateY(4px) translateX(3px) rotate(0.5deg); }
      100% { transform: translateY(-5px) translateX(0px) rotate(-1deg); }
    }

    @keyframes pulse-soft {
      0% { opacity: 0.3; }
      50% { opacity: 0.75; }
      100% { opacity: 0.3; }
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes scanline {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(270px); opacity: 0; }
    }

    /* Flapping Wings Keyframes */
    @keyframes flap-left {
      0%, 100% { transform: scaleX(1) rotate(0deg); }
      50% { transform: scaleX(0.2) rotate(-10deg); }
    }
    
    @keyframes flap-right {
      0%, 100% { transform: scaleX(1) rotate(0deg); }
      50% { transform: scaleX(0.2) rotate(10deg); }
    }

    /* Classes */
    .bird-container-1 {
      transform-origin: 720px 120px;
      animation: float-slow 7s ease-in-out infinite;
    }

    .bird-container-2 {
      transform-origin: 820px 60px;
      animation: float-offset 9s ease-in-out infinite;
    }

    .left-wing {
      transform-origin: 120px 70px;
      animation: flap-left 3.5s ease-in-out infinite;
    }

    .right-wing {
      transform-origin: 120px 70px;
      animation: flap-right 3.5s ease-in-out infinite;
    }

    .left-wing-small {
      transform-origin: 60px 35px;
      animation: flap-left 2.8s ease-in-out infinite;
    }

    .right-wing-small {
      transform-origin: 60px 35px;
      animation: flap-right 2.8s ease-in-out infinite;
    }

    .radar-circle {
      transform-origin: 150px 130px;
      animation: float-slow 12s ease-in-out infinite alternate;
    }

    .terminal-cursor {
      animation: cursor-blink 1.1s step-end infinite;
    }

    .scan-line-element {
      animation: scanline 8s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bg-grad)" />
  <rect width="900" height="260" fill="url(#grid)" />

  <!-- Animated Scan Line -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="rgba(94, 196, 220, 0.15)" stroke-width="1.5" class="scan-line-element" />

  <!-- Architectural Design Accents (Left Side Grid Work) -->
  <g opacity="0.6" class="radar-circle">
    <!-- Concentric Circles / Radar Guide -->
    <circle cx="150" cy="130" r="90" fill="none" stroke="rgba(94, 196, 220, 0.08)" stroke-width="1" stroke-dasharray="4 4" />
    <circle cx="150" cy="130" r="60" fill="none" stroke="rgba(190, 242, 100, 0.05)" stroke-width="1" />
    <circle cx="150" cy="130" r="30" fill="none" stroke="rgba(94, 196, 220, 0.05)" stroke-width="1" />
    
    <!-- Crosshairs -->
    <line x1="40" y1="130" x2="260" y2="130" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    <line x1="150" y1="20" x2="150" y2="240" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />

    <!-- Diagonal Guide Lines -->
    <line x1="60" y1="40" x2="240" y2="220" stroke="rgba(94, 196, 220, 0.04)" stroke-width="1" />
    <line x1="60" y1="220" x2="240" y2="40" stroke="rgba(190, 242, 100, 0.04)" stroke-width="1" />
  </g>

  <!-- Large Animated Origami Bird (Right Center) -->
  <g transform="translate(600, 40)" class="bird-container-1">
    <!-- Shadow projection (subtle dark bird below) -->
    <polygon points="120,75 100,105 120,125 140,105" fill="rgba(0,0,0,0.3)" />

    <!-- Left Wing (Flapping) -->
    <g class="left-wing">
      <polygon points="120,70 50,55 100,100" fill="rgba(94, 196, 220, 0.12)" stroke="rgba(94, 196, 220, 0.4)" stroke-width="1" />
      <polygon points="50,55 80,75 100,100" fill="rgba(94, 196, 220, 0.08)" stroke="rgba(94, 196, 220, 0.3)" stroke-width="0.75" />
    </g>

    <!-- Right Wing (Flapping) -->
    <g class="right-wing">
      <polygon points="120,70 190,55 140,100" fill="rgba(94, 196, 220, 0.18)" stroke="rgba(94, 196, 220, 0.45)" stroke-width="1" />
      <polygon points="190,55 160,75 140,100" fill="rgba(94, 196, 220, 0.12)" stroke="rgba(94, 196, 220, 0.3)" stroke-width="0.75" />
    </g>

    <!-- Center Body / Facets (Static relative to wings) -->
    <!-- Head / Beak -->
    <polygon points="120,70 120,35 110,48" fill="rgba(190, 242, 100, 0.25)" stroke="#bef264" stroke-width="1" filter="url(#glow-lime)" />
    <!-- Chest / Main Fold -->
    <polygon points="120,70 100,100 120,120 140,100" fill="rgba(190, 242, 100, 0.15)" stroke="#bef264" stroke-width="1" />
    <line x1="120" y1="70" x2="120" y2="120" stroke="rgba(190, 242, 100, 0.5)" stroke-width="0.75" />
    <!-- Tail Fold -->
    <polygon points="120,120 120,170 132,158" fill="rgba(94, 196, 220, 0.2)" stroke="#5ec4dc" stroke-width="1" filter="url(#glow-cyan)" />
    <polygon points="120,120 120,170 108,158" fill="rgba(94, 196, 220, 0.1)" stroke="#5ec4dc" stroke-width="0.75" />
    
    <!-- Wireframe Connector Lines to Grid (Architectural Feel) -->
    <line x1="120" y1="35" x2="200" y2="-10" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.75" stroke-dasharray="2 2" />
    <line x1="120" y1="170" x2="60" y2="220" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.75" stroke-dasharray="2 2" />
    
    <!-- Technical Label -->
    <text x="145" y="125" fill="rgba(255, 255, 255, 0.3)" font-family="Courier New, monospace" font-size="8">P_CRANE_01 [600,40]</text>
  </g>

  <!-- Small Animated Origami Bird (Top Right, Trailing) -->
  <g transform="translate(750, 20) scale(0.55)" class="bird-container-2">
    <!-- Left Wing (Flapping) -->
    <g class="left-wing-small">
      <polygon points="60,35 25,27 50,50" fill="rgba(94, 196, 220, 0.12)" stroke="rgba(94, 196, 220, 0.4)" stroke-width="1" />
    </g>

    <!-- Right Wing (Flapping) -->
    <g class="right-wing-small">
      <polygon points="60,35 95,27 70,50" fill="rgba(94, 196, 220, 0.18)" stroke="rgba(94, 196, 220, 0.45)" stroke-width="1" />
    </g>

    <!-- Center Body -->
    <polygon points="60,35 60,17 55,24" fill="rgba(190, 242, 100, 0.25)" stroke="#bef264" stroke-width="1" />
    <polygon points="60,35 50,50 60,60 70,50" fill="rgba(190, 242, 100, 0.15)" stroke="#bef264" stroke-width="1" />
    <polygon points="60,60 60,85 66,79" fill="rgba(94, 196, 220, 0.2)" stroke="#5ec4dc" stroke-width="1" />

    <!-- Technical Label -->
    <text x="75" y="62" fill="rgba(255, 255, 255, 0.25)" font-family="Courier New, monospace" font-size="8">P_CRANE_02 [750,20]</text>
  </g>

  <!-- Center Content -->
  <g transform="translate(180, 0)">
    <!-- Vertical line accent -->
    <line x1="50" y1="60" x2="50" y2="185" stroke="rgba(94, 196, 220, 0.2)" stroke-width="2" />
    <circle cx="50" cy="60" r="2" fill="#5ec4dc" />
    <circle cx="50" cy="185" r="2" fill="#5ec4dc" />

    <text x="70" y="90" fill="#bef264" font-family="'Geist Mono', 'JetBrains Mono', 'Courier New', monospace" font-size="11" font-weight="600" letter-spacing="0.25em">ENGINEERING &amp; DESIGN</text>
    <text x="70" y="142" fill="#ffffff" font-family="'Geist', 'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="44" font-weight="700" letter-spacing="0.04em">MATT SHADE</text>
    <text x="70" y="174" fill="rgba(255, 255, 255, 0.65)" font-family="'Geist Mono', 'JetBrains Mono', 'Courier New', monospace" font-size="12" font-weight="400" letter-spacing="0.08em">
      DIRECTOR OF AI ENGINEERING <tspan fill="#5ec4dc">//</tspan> DESIGN ENGINEERING
    </text>
    <text x="70" y="195" fill="rgba(255, 255, 255, 0.25)" font-family="Courier New, monospace" font-size="9">
      STATUS: ACTIVE // LOC: NYC // SYS: BUILD_CONF_OK<tspan fill="#bef264" class="terminal-cursor">█</tspan>
    </text>
  </g>

  <!-- Right Edge Accent -->
  <rect x="894" y="80" width="6" height="40" fill="#5ec4dc" opacity="0.8" />
  <rect x="894" y="125" width="6" height="50" fill="#bef264" opacity="0.8" />
</svg>
