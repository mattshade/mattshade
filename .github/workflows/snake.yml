name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mattshade
          outputs: |
            dist/github-snake.svg?color_snake=bef264&color_dots=161618,2a3d1f,4a6b2e,7a9a4e,bef264
            dist/github-snake-dark.svg?color_snake=bef264&color_dots=0a0a0b,1a2412,2d4a1a,5a7a3a,bef264

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
