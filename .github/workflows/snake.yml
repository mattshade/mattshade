name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mattshade
          outputs: |
            dist/github-snake.svg?color_snake=5ec4dc&color_dots=d0d7de,9ec4dc,5ec4dc,3a9fbf,bef264
            dist/github-snake-dark.svg?color_snake=bef264&color_dots=21262d,1a3348,2d5570,5ec4dc,bef264

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
