name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: mattshade
          outputs: |
            dist/github-snake.svg?color_snake=5ec4dc&color_dots=9ca3af,c4e8f5,5ec4dc,3a9fbf,bef264
            dist/github-snake-dark.svg?color_snake=bef264&color_dots=3d444d,1a4a62,2d5570,5ec4dc,bef264

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare writable snake build directory
        run: cp -r dist build

      - name: Inline snake colors for GitHub img rendering
        run: SNAKE_BUILD_DIR=build node scripts/inline-snake-colors.mjs

      - name: Rasterize snake PNG fallback
        run: |
          npm install --prefix scripts sharp
          SNAKE_BUILD_DIR=build node scripts/rasterize-snake.mjs
          cp build/github-snake-dark.png assets/contribution-snake.png

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snake PNG to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update contribution snake PNG"
          file_pattern: assets/contribution-snake.png
