name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: mattshade
          outputs: |
            dist/github-snake.svg?color_snake=5ec4dc&color_dots=ebedf0,0f1a24,1a3348,2d5570,bef264
            dist/github-snake-dark.svg?color_snake=bef264&color_dots=0a0a0b,0f1a24,1a3348,2d5570,5ec4dc
            dist/github-snake-ocean.gif?palette=github-dark&color_snake=bef264&color_dots=0a0a0b,0f1a24,1a3348,5ec4dc,bef264&color_background=0a0a0b

      - uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
