<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#bef264" fill-opacity="0.14"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7a9a6e" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#7a9a6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d4f3a"/>
      <stop offset="50%" stop-color="#7a9a6e"/>
      <stop offset="100%" stop-color="#5f7a58"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="#0a0a0b"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- origami wireframe accents -->
  <g stroke="url(#wire)" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <line x1="80" y1="260" x2="260" y2="90"/>
    <line x1="260" y1="90" x2="430" y2="250"/>
    <line x1="430" y1="250" x2="80" y2="260"/>
    <line x1="920" y1="250" x2="1080" y2="80"/>
    <line x1="1080" y1="80" x2="1140" y2="240"/>
    <line x1="1140" y1="240" x2="920" y2="250"/>
    <line x1="560" y1="280" x2="640" y2="180"/>
    <line x1="640" y1="180" x2="720" y2="280"/>
  </g>

  <g fill="#bef264" opacity="0.35">
    <circle cx="260" cy="90" r="2.5"/>
    <circle cx="1080" cy="80" r="2.5"/>
    <circle cx="640" cy="180" r="2"/>
  </g>

  <text x="600" y="118" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" letter-spacing="4">
    <tspan fill="#999999">ENGINEERING</tspan><tspan fill="#bef264"> | </tspan><tspan fill="#999999">DESIGN</tspan>
  </text>

  <text x="600" y="188" text-anchor="middle" fill="#bef264" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" letter-spacing="-2">Matt Shade</text>

  <text x="600" y="232" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20">AI-powered tools &amp; interfaces ¯ data into clarity &amp; action</text>
</svg>
