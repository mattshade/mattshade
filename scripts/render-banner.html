<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 320px;
      overflow: hidden;
      background: #0a0a0b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .banner {
      position: relative;
      width: 1200px;
      height: 320px;
      background:
        radial-gradient(circle at 50% 35%, rgba(122, 154, 110, 0.18) 0%, rgba(122, 154, 110, 0.06) 45%, transparent 70%),
        radial-gradient(rgba(190, 242, 100, 0.14) 1px, transparent 1px);
      background-size: auto, 40px 40px;
      background-color: #0a0a0b;
    }
    .wire {
      position: absolute;
      inset: 0;
      opacity: 0.55;
    }
    .wire line {
      stroke: #5f7a58;
      stroke-width: 1.2;
      stroke-linecap: round;
    }
    .copy {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 48px;
    }
    .eyebrow {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 18px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .eyebrow .muted { color: #999999; }
    .eyebrow .pipe { color: #bef264; }
    .name {
      color: #bef264;
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 12px;
      text-shadow: 2px 0 18px rgba(0, 0, 0, 0.55), -2px 0 18px rgba(0, 0, 0, 0.55);
    }
    .tagline {
      color: #9ca3af;
      font-size: 20px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="banner">
    <svg class="wire" viewBox="0 0 1200 320" aria-hidden="true">
      <line x1="80" y1="260" x2="260" y2="90" />
      <line x1="260" y1="90" x2="430" y2="250" />
      <line x1="430" y1="250" x2="80" y2="260" />
      <line x1="920" y1="250" x2="1080" y2="80" />
      <line x1="1080" y1="80" x2="1140" y2="240" />
      <line x1="1140" y1="240" x2="920" y2="250" />
      <line x1="560" y1="280" x2="640" y2="180" />
      <line x1="640" y1="180" x2="720" y2="280" />
      <circle cx="260" cy="90" r="2.5" fill="#bef264" opacity="0.35" />
      <circle cx="1080" cy="80" r="2.5" fill="#bef264" opacity="0.35" />
      <circle cx="640" cy="180" r="2" fill="#bef264" opacity="0.35" />
    </svg>
    <div class="copy">
      <div class="eyebrow">
        <span class="muted">Engineering</span><span class="pipe"> | </span><span class="muted">Design</span>
      </div>
      <div class="name">Matt Shade</div>
      <div class="tagline">AI-powered tools and interfaces | data into clarity and action</div>
    </div>
  </div>
</body>
</html>
