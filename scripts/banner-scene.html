<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 900px;
      height: 260px;
      overflow: hidden;
      background: #0a0a0b;
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(190, 242, 100, 0.11) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    #cv {
      position: absolute;
      right: 0;
      top: 0;
      width: 480px;
      height: 260px;
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      padding: 36px 0 0 48px;
    }
    .rail {
      position: absolute;
      left: 48px;
      top: 52px;
      width: 2px;
      height: 132px;
      background: linear-gradient(180deg, rgba(94,196,220,0.15), rgba(94,196,220,0.45), rgba(94,196,220,0.15));
    }
    .rail::before, .rail::after {
      content: '';
      position: absolute;
      left: -2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5ec4dc;
    }
    .rail::before { top: -3px; }
    .rail::after { bottom: -3px; }
    .copy { margin-left: 34px; }
    .eyebrow {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: #999;
      margin-bottom: 10px;
    }
    .eyebrow span { color: #bef264; }
    .name {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
      margin-bottom: 10px;
    }
    .role {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .role em { color: #5ec4dc; font-style: normal; }
    .meta {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.06em;
    }
    .guides {
      position: absolute;
      left: 28px;
      top: 28px;
      width: 150px;
      height: 150px;
      opacity: 0.45;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <svg class="guides" viewBox="0 0 150 150" aria-hidden="true">
    <circle cx="75" cy="75" r="68" fill="none" stroke="rgba(94,196,220,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
    <circle cx="75" cy="75" r="44" fill="none" stroke="rgba(190,242,100,0.08)" stroke-width="1"/>
    <line x1="10" y1="75" x2="140" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="75" y1="10" x2="75" y2="140" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </svg>

  <div class="overlay">
    <div class="rail"></div>
    <div class="copy">
      <div class="eyebrow">ENGINEERING <span>|</span> DESIGN</div>
      <div class="name">MATT SHADE</div>
      <div class="role">DIRECTOR OF AI ENGINEERING <em>//</em> DESIGN ENGINEERING</div>
      <div class="meta">BRIDGE PERSON // SYSTEMS + DESIGN + AI</div>
    </div>
  </div>

  <canvas id="cv"></canvas>

  <script type="module">
    import * as THREE from '/three/three.module.js';

    const FILL = 0x121a14;
    const ACCENT = 0x7a9a6e;

    function pushPart(parts, positions, indices) {
      parts.push({ positions, indices });
    }

    function mergeParts(parts) {
      const positions = [];
      const indices = [];
      let offset = 0;
      for (const part of parts) {
        positions.push(...part.positions);
        for (const idx of part.indices) indices.push(idx + offset);
        offset += part.positions.length / 3;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      return geo;
    }

    function buildCraneBodyParts() {
      const p = [];
      const crown = [0, 0.16, 0];
      const front = [0, 0.02, 0.09];
      const back = [0, 0.02, -0.09];
      const left = [-0.065, 0.09, 0];
      const right = [0.065, 0.09, 0];
      const keel = [0, -0.04, 0];
      pushPart(p, [...crown, ...left, ...front], [0, 1, 2]);
      pushPart(p, [...crown, ...front, ...right], [0, 1, 2]);
      pushPart(p, [...crown, ...right, ...back], [0, 1, 2]);
      pushPart(p, [...crown, ...back, ...left], [0, 1, 2]);
      pushPart(p, [...left, ...front, ...keel], [0, 1, 2]);
      pushPart(p, [...right, ...front, ...keel], [0, 1, 2]);
      pushPart(p, [...left, ...back, ...keel], [0, 1, 2]);
      pushPart(p, [...right, ...back, ...keel], [0, 1, 2]);
      return p;
    }

    function buildCraneNeckParts() {
      const p = [];
      pushPart(p, [0, 0, 0, -0.018, 0.05, 0.04, 0.018, 0.05, 0.04], [0, 1, 2]);
      pushPart(p, [0, 0.05, 0.04, -0.014, 0.14, 0.1, 0.014, 0.14, 0.1], [0, 1, 2]);
      pushPart(p, [0, 0.14, 0.1, -0.01, 0.24, 0.16, 0.01, 0.24, 0.16], [0, 1, 2]);
      pushPart(p, [0, 0.24, 0.16, 0, 0.3, 0.2, -0.008, 0.27, 0.18], [0, 1, 2]);
      pushPart(p, [0, 0.24, 0.16, 0.008, 0.27, 0.18, 0, 0.3, 0.2], [0, 1, 2]);
      return p;
    }

    function buildCraneHeadParts() {
      const p = [];
      pushPart(p, [0, 0, 0, -0.024, 0.02, 0.02, 0.024, 0.02, 0.02], [0, 1, 2]);
      pushPart(p, [0, 0.02, 0.02, 0, 0.06, 0.05, -0.016, 0.04, 0.035], [0, 1, 2]);
      pushPart(p, [0, 0.02, 0.02, 0.016, 0.04, 0.035, 0, 0.06, 0.05], [0, 1, 2]);
      pushPart(p, [0, 0.06, 0.05, 0, 0.04, 0.12, -0.01, 0.05, 0.09], [0, 1, 2]);
      pushPart(p, [0, 0.06, 0.05, 0.01, 0.05, 0.09, 0, 0.04, 0.12], [0, 1, 2]);
      return p;
    }

    function buildCraneWingParts(sign) {
      const s = sign;
      const p = [];
      pushPart(p, [0, 0, 0, s * -0.42, 0.14, 0.02, s * -0.08, 0.02, -0.02], [0, 1, 2]);
      pushPart(p, [s * -0.42, 0.14, 0.02, s * -0.38, 0.2, 0.08, s * -0.1, 0.08, 0.04], [0, 1, 2]);
      pushPart(p, [0, 0, 0, s * -0.1, 0.08, 0.04, s * -0.08, 0.02, -0.02], [0, 1, 2]);
      pushPart(p, [s * -0.2, 0.06, 0.01, s * -0.34, 0.12, 0.03, s * -0.28, 0.1, -0.02], [0, 1, 2]);
      return p;
    }

    function buildCraneTailParts() {
      const p = [];
      pushPart(p, [0, 0, 0, -0.018, 0.05, -0.04, 0.018, 0.05, -0.04], [0, 1, 2]);
      pushPart(p, [0, 0.05, -0.04, -0.014, 0.14, -0.1, 0.014, 0.14, -0.1], [0, 1, 2]);
      pushPart(p, [0, 0.14, -0.1, -0.01, 0.24, -0.16, 0.01, 0.24, -0.16], [0, 1, 2]);
      pushPart(p, [0, 0.24, -0.16, 0, 0.3, -0.2, -0.008, 0.27, -0.18], [0, 1, 2]);
      pushPart(p, [0, 0.24, -0.16, 0.008, 0.27, -0.18, 0, 0.3, -0.2], [0, 1, 2]);
      return p;
    }

    function addCreaseLines(parent, segments, color, opacity) {
      const pos = [];
      for (const [ax, ay, az, bx, by, bz] of segments) pos.push(ax, ay, az, bx, by, bz);
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      parent.add(new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
        color, transparent: true, opacity, depthWrite: false, toneMapped: false,
      })));
    }

    function addPartMesh(parent, geo, fillColor, accentColor, fillOpacity, edgeOpacity, creaseAngle) {
      parent.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: fillColor, transparent: true, opacity: fillOpacity, side: THREE.DoubleSide, depthWrite: true, toneMapped: false,
      })));
      parent.add(new THREE.LineSegments(
        new THREE.EdgesGeometry(geo, creaseAngle),
        new THREE.LineBasicMaterial({ color: accentColor, transparent: true, opacity: edgeOpacity, depthWrite: false, toneMapped: false }),
      ));
    }

    function createArticulatedOrigamiBird(detail = 'sculptural') {
      const root = new THREE.Group();
      const fillOpacity = detail === 'sculptural' ? 0.9 : 0.84;
      const edgeOpacity = detail === 'sculptural' ? 0.72 : 0.62;
      const crease = detail === 'sculptural' ? 16 : 20;
      const wingSpreadAngle = 0.42;
      const creaseOpacity = edgeOpacity * 0.6;

      const body = new THREE.Group();
      addPartMesh(body, mergeParts(buildCraneBodyParts()), FILL, ACCENT, fillOpacity, edgeOpacity, crease);
      addCreaseLines(body, [
        [0, 0.16, 0, 0, 0.02, 0.09],
        [0, 0.16, 0, 0, 0.02, -0.09],
        [-0.065, 0.09, 0, 0.065, 0.09, 0],
        [0, 0.16, 0, 0, -0.04, 0],
      ], ACCENT, creaseOpacity);
      root.add(body);

      const neck = new THREE.Group();
      neck.position.set(0, 0.08, 0.09);
      addPartMesh(neck, mergeParts(buildCraneNeckParts()), FILL, ACCENT, fillOpacity, edgeOpacity, crease - 2);
      body.add(neck);

      const head = new THREE.Group();
      head.position.set(0, 0.3, 0.2);
      head.rotation.x = 0.55;
      addPartMesh(head, mergeParts(buildCraneHeadParts()), FILL, ACCENT, fillOpacity, edgeOpacity * 1.08, crease - 4);
      neck.add(head);

      const leftWing = new THREE.Group();
      leftWing.position.set(-0.065, 0.1, 0);
      leftWing.rotation.order = 'YXZ';
      leftWing.rotation.x = wingSpreadAngle;
      addPartMesh(leftWing, mergeParts(buildCraneWingParts(-1)), FILL, ACCENT, fillOpacity, edgeOpacity, crease);
      addCreaseLines(leftWing, [[0, 0, 0, -0.42, 0.14, 0.02]], ACCENT, creaseOpacity);
      body.add(leftWing);

      const rightWing = new THREE.Group();
      rightWing.position.set(0.065, 0.1, 0);
      rightWing.rotation.order = 'YXZ';
      rightWing.rotation.x = wingSpreadAngle;
      addPartMesh(rightWing, mergeParts(buildCraneWingParts(1)), FILL, ACCENT, fillOpacity, edgeOpacity, crease);
      addCreaseLines(rightWing, [[0, 0, 0, 0.42, 0.14, 0.02]], ACCENT, creaseOpacity);
      body.add(rightWing);

      const tail = new THREE.Group();
      tail.position.set(0, 0.08, -0.09);
      addPartMesh(tail, mergeParts(buildCraneTailParts()), FILL, ACCENT, fillOpacity * 0.95, edgeOpacity, crease);
      body.add(tail);

      return { root, leftWing, rightWing, wingSpreadAngle };
    }

    const canvas = document.getElementById('cv');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(480, 260, false);
    renderer.setPixelRatio(2);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 480 / 260, 0.1, 100);
    camera.position.set(-0.42, 0.88, 2.65);
    camera.lookAt(0.12, 0.58, 0);

    const hero = createArticulatedOrigamiBird('sculptural');
    hero.root.position.set(0.18, 0.38, 0);
    hero.root.rotation.set(-0.08, 0.45, 0.05);
    hero.root.scale.setScalar(2.0);
    scene.add(hero.root);

    const flock = createArticulatedOrigamiBird('flock');
    flock.root.position.set(0.88, 0.82, -0.22);
    flock.root.rotation.set(-0.15, 0.32, 0.1);
    flock.root.scale.setScalar(0.95);
    scene.add(flock.root);

    const heroBase = { x: 0.18, y: 0.38, z: 0 };
    const flockBase = { x: 0.88, y: 0.82, z: -0.22 };

    // Integer harmonics only (k * T where T = phase * 2π) so phase 0 === phase 1.
    function animateBirds(phase) {
      const t = phase * Math.PI * 2;

      animateWing(hero.leftWing, hero.wingSpreadAngle, t, 0);
      animateWing(hero.rightWing, hero.wingSpreadAngle, t, Math.PI * 0.5);
      animateWing(flock.leftWing, flock.wingSpreadAngle, t, Math.PI * 0.25);
      animateWing(flock.rightWing, flock.wingSpreadAngle, t, Math.PI * 0.75);

      hero.root.position.set(
        heroBase.x + Math.sin(t) * 0.11,
        heroBase.y + Math.cos(t) * 0.04,
        heroBase.z + Math.sin(t + Math.PI) * 0.03,
      );
      hero.root.rotation.set(
        -0.08 + Math.sin(t) * 0.04,
        0.45 + Math.cos(t) * 0.06,
        0.05 + Math.sin(t + Math.PI * 0.5) * 0.05,
      );

      const ft = t + 1.15;
      flock.root.position.set(
        flockBase.x + Math.sin(ft) * 0.14,
        flockBase.y + Math.cos(ft) * 0.045,
        flockBase.z + Math.sin(ft + Math.PI) * 0.035,
      );
      flock.root.rotation.set(
        -0.15 + Math.sin(ft) * 0.035,
        0.32 + Math.cos(ft) * 0.07,
        0.1 + Math.sin(ft + Math.PI * 0.5) * 0.06,
      );
    }

    function animateWing(wing, spread, t, phase) {
      wing.rotation.x = spread + Math.sin(t * 3 + phase) * 0.13;
    }

    window.renderBannerFrame = (phase = 0) => {
      animateBirds(phase);
      renderer.render(scene, camera);
    };

    window.renderBannerFrame(0);
    window.__bannerReady = true;
  </script>
</body>
</html>
